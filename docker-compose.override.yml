
services:
  microserviceapp.basket.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - BusOption:Address=rabbitmq
      - BusOption:Port=5672
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:Issuer=http://keycloak:8080/realms/mgmTenant
      - ConnectionStrings:Redis=redis.db.basket:6379,password=Password12
    ports:
      - "8080"
    depends_on:
      - redis.db.basket
      - rabbitmq
    restart: always


  microserviceapp.catalog.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - BusOption:Address=rabbitmq
      - BusOption:Port=5672
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:Issuer=http://keycloak:8080/realms/mgmTenant
      - MongoOption:ConnectionString=mongodb://myuser:Password12@mongo.db.catalog:27017
    ports:
      - "8080"
    depends_on:
      - mongo.db.catalog
      - rabbitmq
    restart: always


  microserviceapp.discount.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - BusOption:Address=rabbitmq
      - BusOption:Port=5672
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:Issuer=http://keycloak:8080/realms/mgmTenant
      - MongoOption:ConnectionString=mongodb://myuser:Password12@mongo.db.discount:27017
    ports:
      - "8080"
    depends_on:
      - mongo.db.discount
      - rabbitmq
    restart: always


  microserviceapp.file.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - BusOption:Address=rabbitmq
      - BusOption:Port=5672
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:Issuer=http://keycloak:8080/realms/mgmTenant
    ports:
      - "8080"
    restart: always
    depends_on:
      - rabbitmq


  microserviceapp.gateway:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:Issuer=http://keycloak:8080/realms/mgmTenant
    ports:
      - "8080"
    restart: always


  microserviceapp.order.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - BusOption:Address=rabbitmq
      - BusOption:Port=5672
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:Issuer=http://keycloak:8080/realms/mgmTenant
      - AddressUrlOption:PaymentUrl=http://microserviceapp.payment.api:8080
      - ConnectionStrings:SqlServer=Server=sqlserver.db.order,1433;Database=OrderDockerDb;User=Sa;Password=Password12*;Trusted_Connection=False;TrustServerCertificate=True;Integrated Security=False
    ports:
      - "8080"
    depends_on:
      - sqlserver.db.order
      - rabbitmq
    restart: always


  microserviceapp.payment.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - BusOption:Address=rabbitmq
      - BusOption:Port=5672
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:Issuer=http://keycloak:8080/realms/mgmTenant
    ports:
      - "8080"
    restart: always
    depends_on:
      - rabbitmq


  microserviceapp.web:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - MicroserviceOption:Basket:BaseAddress=http://microserviceapp.basket.api:8080
      - MicroserviceOption:Catalog:BaseAddress=http://microserviceapp.catalog.api:8080
      - MicroserviceOption:Discount:BaseAddress=http://microserviceapp.discount.api:8080
      - MicroserviceOption:File:BaseAddress=http://microserviceapp.file.api:8080
      - MicroserviceOption:Order:BaseAddress=http://microserviceapp.order.api:8080
      - GatewayOption:BaseAddress=http://microserviceapp.gateway:8080
      - IdentityOption:Address=http://keycloak:8080/realms/mgmTenant
      - IdentityOption:BaseAddress=http://keycloak:8080
    ports:
      - "5050:8080"
    restart: always

